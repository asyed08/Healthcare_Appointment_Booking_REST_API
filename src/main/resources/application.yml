spring:
  application:
    name: healthcare-api

  datasource:
    url: jdbc:postgresql://localhost:5432/healthcare_db
    username: healthcare_user
    password: healthcare_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: healthcare-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ameen.healthcare.dto.event"

server:
  port: 8080

# ===== Application-specific configuration =====
application:
  security:
    jwt:
      # 256-bit hex-encoded secret key (replace with a securely generated value in production)
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000       # Access token TTL: 24 hours (ms)
      refresh-token:
        expiration: 604800000    # Refresh token TTL: 7 days (ms)

# ===== Springdoc / Swagger UI =====
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tags-sorter: alpha
    display-request-duration: true

# ===== Logging =====
logging:
  level:
    com.ameen.healthcare: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO

