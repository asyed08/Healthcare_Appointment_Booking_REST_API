spring:
  application:
    name: healthcare-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/healthcare_db}
    username: ${SPRING_DATASOURCE_USERNAME:healthcare_user}
    password: ${SPRING_DATASOURCE_PASSWORD:healthcare_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@healthcare.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    test-connection: false   # Set to true to fail fast if SMTP is unreachable on startup

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        acks: all                          # Wait for all replicas
        retries: 3                         # Retry failed sends
        enable.idempotence: true           # Prevent duplicate messages
    consumer:
      group-id: appointment-service-group
      auto-offset-reset: earliest
      max-poll-records: 10
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ameen.healthcare.dto.event"

server:
  port: 8080

# ===== Application-specific configuration =====
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 86400000       # Access token TTL: 24 hours (ms)
      refresh-token:
        expiration: 604800000    # Refresh token TTL: 7 days (ms)

# ===== Kafka SASL/SSL (set via env vars for Confluent Cloud; empty = PLAINTEXT for local) =====
kafka:
  security:
    protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
  sasl:
    mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
    jaas:
      config: ${KAFKA_SASL_JAAS_CONFIG:}

# ===== Springdoc / Swagger UI =====
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tags-sorter: alpha
    display-request-duration: true

# ===== Logging =====
logging:
  level:
    com.ameen.healthcare: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO

