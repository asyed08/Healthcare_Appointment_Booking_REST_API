version: '3.8'

services:

  # ===== PostgreSQL =====
  postgres:
    image: postgres:15-alpine
    container_name: healthcare_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthcare_db
      POSTGRES_USER: healthcare_user
      POSTGRES_PASSWORD: healthcare_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - healthcare_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare_user -d healthcare_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===== Zookeeper (required by Kafka) =====
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: healthcare_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - healthcare_network

  # ===== Apache Kafka =====
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: healthcare_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT  → accessible from the host machine (localhost:9092)
      # PLAINTEXT_INTERNAL → inter-container communication (kafka:29092)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - healthcare_network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===== Spring Boot Application =====
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthcare_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Override datasource to use the Docker service name instead of localhost
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/healthcare_db
      SPRING_DATASOURCE_USERNAME: healthcare_user
      SPRING_DATASOURCE_PASSWORD: healthcare_pass
      # Override Kafka bootstrap server to use internal Docker listener
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - healthcare_network

volumes:
  postgres_data:
    driver: local

networks:
  healthcare_network:
    driver: bridge

